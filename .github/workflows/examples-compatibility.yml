name: examples compatibility

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  urirun-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout urirun
        uses: actions/checkout@v4
        with:
          path: urirun
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Checkout extracted test dependencies in parallel
        run: python urirun/scripts/checkout_ci_dependencies.py unit .
      - name: Install urirun from this checkout
        run: |
          python -m pip install -U pip
          python -m pip install -e './urirun/adapters/python[test]'
          python -m pip install --no-deps -e ./urirun-connector-twin -e ./urirun-connector-domain-monitor
          (cd urirun/adapters/python && python -c "import urirun, pathlib; print(urirun.__file__); print(getattr(urirun, '__version__', 'unknown')); assert pathlib.Path(urirun.__file__).resolve().as_posix().startswith(pathlib.Path('.').resolve().as_posix())")
      - name: Run urirun tests
        run: make -C urirun test

  examples-classification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout urirun
        uses: actions/checkout@v4
        with:
          path: urirun
      - name: Checkout examples
        uses: actions/checkout@v4
        with:
          repository: if-uri/examples
          path: examples
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install urirun from this checkout
        run: |
          python -m pip install -U pip
          python -m pip install -e ./urirun/adapters/python
          (cd urirun/adapters/python && python -c "import urirun, pathlib; print(urirun.__file__); print(getattr(urirun, '__version__', 'unknown')); assert pathlib.Path(urirun.__file__).resolve().as_posix().startswith(pathlib.Path('.').resolve().as_posix())")
      - name: Validate manifest and audit coverage
        run: |
          make -C examples audit
          make -C examples ci-classification

  examples-host:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout urirun
        uses: actions/checkout@v4
        with:
          path: urirun
      - name: Checkout examples
        uses: actions/checkout@v4
        with:
          repository: if-uri/examples
          path: examples
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Checkout host example dependencies in parallel
        run: python urirun/scripts/checkout_ci_dependencies.py host .
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install host toolchain
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends php-cli gcc golang-go
      - name: Install urirun from this checkout
        run: |
          python -m pip install -U pip pytest cryptography litellm
          python -m pip install -e ./urirun/adapters/python
          editable=(-e ./urirun-declarative)
          for directory in urirun-connector-*; do
            if [[ -f "$directory/pyproject.toml" ]]; then editable+=(-e "./$directory"); fi
          done
          python -m pip install --no-deps "${editable[@]}"
          (cd urirun/adapters/python && python -c "import urirun, pathlib; print(urirun.__file__); print(getattr(urirun, '__version__', 'unknown')); assert pathlib.Path(urirun.__file__).resolve().as_posix().startswith(pathlib.Path('.').resolve().as_posix())")
      - name: Run host examples
        env:
          URIRUN_SHA: ${{ github.sha }}
        run: |
          echo "EXAMPLES_SHA=$(git -C examples rev-parse HEAD)" >> "$GITHUB_ENV"
          make -C examples test
          make -C examples test-all
          make -C examples ci-host
      - name: Upload host artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: examples-host-artifacts
          path: examples/ci-artifacts/host

  examples-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout urirun
        uses: actions/checkout@v4
        with:
          path: urirun
      - name: Checkout examples
        uses: actions/checkout@v4
        with:
          repository: if-uri/examples
          path: examples
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Checkout Docker example dependencies in parallel
        run: python urirun/scripts/checkout_ci_dependencies.py docker .
      - name: Install urirun from this checkout
        run: |
          python -m pip install -U pip pytest
          python -m pip install -e ./urirun/adapters/python
          (cd urirun/adapters/python && python -c "import urirun, pathlib; print(urirun.__file__); print(getattr(urirun, '__version__', 'unknown')); assert pathlib.Path(urirun.__file__).resolve().as_posix().startswith(pathlib.Path('.').resolve().as_posix())")
      - name: Run Docker examples
        env:
          URIRUN_SHA: ${{ github.sha }}
        run: |
          echo "EXAMPLES_SHA=$(git -C examples rev-parse HEAD)" >> "$GITHUB_ENV"
          make -C examples ci-docker
      - name: Docker compose diagnostics
        if: failure()
        run: |
          docker compose ls || true
          docker ps -a || true
      - name: Docker cleanup
        if: always()
        run: |
          find examples -name 'docker-compose*.yml' -o -name 'compose*.yml' | while read -r compose_file; do
            docker compose -f "$compose_file" down -v --remove-orphans || true
          done
          docker system prune -af --volumes || true
      - name: Upload Docker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: examples-docker-artifacts
          path: examples/ci-artifacts/docker

  summary:
    runs-on: ubuntu-latest
    needs:
      - urirun-unit
      - examples-classification
      - examples-host
      - examples-docker
    if: always()
    steps:
      - name: Summarize compatibility jobs
        run: |
          {
            echo "# urirun examples compatibility"
            echo
            echo "- urirun SHA: \`${{ github.sha }}\`"
            echo "- urirun-unit: \`${{ needs.urirun-unit.result }}\`"
            echo "- examples-classification: \`${{ needs.examples-classification.result }}\`"
            echo "- examples-host: \`${{ needs.examples-host.result }}\`"
            echo "- examples-docker: \`${{ needs.examples-docker.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
