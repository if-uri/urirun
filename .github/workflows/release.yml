name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        working-directory: adapters/python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Smoke-test the built wheel
        working-directory: adapters/python
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install dist/*.whl
          /tmp/venv/bin/python -c "import urirun, urirun.v1, urirun.v2; print('urirun', getattr(urirun,'__version__','?'), 'ok')"
          /tmp/venv/bin/urirun --help >/dev/null

      - name: Checksums
        working-directory: adapters/python/dist
        run: |
          sha256sum urirun-* > sha256sums.txt
          cat sha256sums.txt

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: adapters/python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            adapters/python/dist/*.whl
            adapters/python/dist/*.tar.gz
            adapters/python/dist/sha256sums.txt
          generate_release_notes: true
